syntax = "proto3";

package cn.iocoder.yudao.module.detection.api;

option java_multiple_files = true;
option java_package = "cn.iocoder.yudao.module.detection.api.hello";
option java_outer_classname = "HelloProto";

service HelloService {
  rpc SayHello (HelloRequest) returns (HelloReply) {}
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}